# Data analytics project — BigQuery-centric analytics platform
# Inherits: billing_account, parent, prefix from data_defaults
# Merges:   managed-by/terraform labels and logging/monitoring APIs from data_merges
# Overrides: billing_account forced by data_overrides

# Override the default parent — data projects live in a dedicated folder
parent: folders/9876543210

# Project-specific labels (merged with data_merges labels)
labels:
  team: data-engineering
  cost-center: data-platform
  application: analytics-warehouse
  data-classification: confidential

# Data analytics services — BigQuery, Dataflow, Composer, etc.
# data_merges ensures logging + monitoring are always present
services:
  - bigquery.googleapis.com
  - bigquerystorage.googleapis.com
  - bigquerydatatransfer.googleapis.com
  - dataflow.googleapis.com
  - composer.googleapis.com
  - datacatalog.googleapis.com
  - datalineage.googleapis.com
  - storage.googleapis.com
  - pubsub.googleapis.com
  - secretmanager.googleapis.com
  - cloudkms.googleapis.com
  - dlp.googleapis.com

# Attach to shared VPC for Dataflow workers
shared_vpc_service_config:
  host_project: myco-dev-shared-vpc-0
  network_users:
    - group:gcp-data-engineers@myco.com
  subnets:
    - projects/myco-dev-shared-vpc-0/regions/us-central1/subnetworks/data-subnet
    - projects/myco-dev-shared-vpc-0/regions/us-east1/subnetworks/data-subnet-dr

# IAM bindings for the project
iam:
  roles/viewer:
    - group:gcp-data-analysts@myco.com
  roles/bigquery.admin:
    - group:gcp-data-engineers@myco.com
  roles/bigquery.dataViewer:
    - group:gcp-data-analysts@myco.com
    - group:gcp-bi-team@myco.com
  roles/bigquery.jobUser:
    - group:gcp-data-analysts@myco.com
    - group:gcp-bi-team@myco.com
    - serviceAccount:dataflow-sa@myco-dev-data-analytics.iam.gserviceaccount.com
  roles/dataflow.admin:
    - group:gcp-data-engineers@myco.com
  roles/composer.admin:
    - group:gcp-data-engineers@myco.com
  roles/storage.admin:
    - group:gcp-data-engineers@myco.com
  roles/cloudkms.cryptoKeyEncrypterDecrypter:
    - serviceAccount:bq-sa@myco-dev-data-analytics.iam.gserviceaccount.com
  roles/dlp.user:
    - group:gcp-data-engineers@myco.com

# Service accounts for data workloads
service_accounts:
  bq-sa:
    display_name: BigQuery Service Account
    description: Used for BigQuery scheduled queries and data transfers
  dataflow-sa:
    display_name: Dataflow Service Account
    description: Used by Dataflow pipelines for ETL processing
  composer-sa:
    display_name: Cloud Composer Service Account
    description: Used by Composer/Airflow DAGs for orchestration

# Project-specific org policies (merged with data_merges org policies)
# The deny-all external IP, uniform bucket access, resource location
# restrictions, and SA key creation block from data_merges are
# automatically included via additive merge.
org_policies:
  # Require CMEK for BigQuery datasets
  "bigquery.requireCmek":
    rules:
      - enforce: true

  # Restrict BigQuery export to only approved destinations
  "bigquery.allowedExportFormats":
    rules:
      - allow:
          values:
            - AVRO
            - PARQUET

  # Restrict Cloud Storage to specific regions for data residency
  "gcp.resourceLocations":
    rules:
      - allow:
          values:
            - us-central1
            - us-east1
