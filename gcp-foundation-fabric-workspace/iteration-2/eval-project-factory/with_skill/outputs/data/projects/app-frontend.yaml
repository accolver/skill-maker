# Standard application project — web frontend service
#
# Inherits from data_defaults:
#   billing_account, parent, prefix, base services, shared_vpc_service_config
# Merges with data_merges:
#   labels (managed-by, org), services (billingbudgets)

labels:
  team: frontend
  env: dev
  cost-center: cc-1234

services:
  - run.googleapis.com
  - artifactregistry.googleapis.com
  - secretmanager.googleapis.com
  - vpcaccess.googleapis.com

iam:
  roles/viewer:
    - group:frontend-viewers@example.com
  roles/run.developer:
    - group:frontend-devs@example.com
  roles/secretmanager.secretAccessor:
    - serviceAccount:frontend-app@myco-dev-app-frontend.iam.gserviceaccount.com

shared_vpc_service_config:
  host_project: myco-prod-net-host-0
  service_identity_iam:
    roles/compute.networkUser:
      - cloudservices
      - vpcaccess

# Org policies applied at the project level
org_policies:
  compute.vmExternalIpAccess:
    rules:
      - enforce: true   # Deny all external IPs
  iam.allowedPolicyMemberDomains:
    rules:
      - allow:
          values:
            - C0xxxxxxx   # Only allow members from this Cloud Identity domain
