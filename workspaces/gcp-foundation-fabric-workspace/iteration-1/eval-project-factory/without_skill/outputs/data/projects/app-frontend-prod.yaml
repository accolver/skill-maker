# Standard application project — frontend production workload
#
# This YAML file is consumed by the CFF project-factory module.
# The filename (minus .yaml) becomes the project key in outputs.

# Project descriptor
project_id: myorg-app-frontend-prod
descriptive_name: "Frontend App - Production"

# Override parent folder (optional — defaults come from data_defaults)
# parent: folders/987654321012

# Labels (merged with defaults)
labels:
  application: frontend
  environment: production
  cost_center: cc-1234
  team: web-platform

# Additional APIs beyond the defaults
services:
  - run.googleapis.com
  - artifactregistry.googleapis.com
  - secretmanager.googleapis.com
  - redis.googleapis.com
  - vpcaccess.googleapis.com
  - certificatemanager.googleapis.com

# IAM bindings
iam:
  "roles/run.admin":
    - group:frontend-devs@example.com
  "roles/secretmanager.secretAccessor":
    - serviceAccount:app-frontend-prod-sa@myorg-app-frontend-prod.iam.gserviceaccount.com
  "roles/monitoring.viewer":
    - group:frontend-devs@example.com
    - group:sre-team@example.com

# IAM additive bindings (won't remove existing bindings)
iam_additive:
  "roles/viewer":
    - group:security-auditors@example.com

# Service accounts to create in this project
service_accounts:
  app-frontend-prod-sa:
    display_name: "Frontend App Service Account"
    description: "Used by Cloud Run frontend service"

# Shared VPC service project configuration
shared_vpc_service_config:
  host_project: myorg-shared-vpc-host
  service_identity_iam:
    "roles/compute.networkUser":
      - cloudservices
      - vpcaccess

# Budget alert
billing_budgets:
  monthly-budget:
    amount: 5000
    thresholds:
      current:
        - 0.5
        - 0.75
        - 0.9
        - 1.0
      forecasted:
        - 0.8
        - 1.0
    email_recipients:
      project_id: myorg-app-frontend-prod
      monitoring_channels: []
